# 服务器配置
server.port=8081

# MySQL数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/todo_app?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=utf8
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=123456

# MyBatis-Plus配置
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.table-prefix=
mybatis-plus.global-config.db-config.id-type=auto

# Sa-Token 配置
sa-token.token-name=token
sa-token.timeout=86400
sa-token.active-timeout=-1
sa-token.is-concurrent=true
sa-token.is-share=true
sa-token.token-style=uuid
sa-token.is-log=false
sa-token.is-read-header=true
sa-token.is-read-cookie=true

# Thymeleaf配置
spring.thymeleaf.cache=false

# 应用配置
spring.application.name=todo-app
