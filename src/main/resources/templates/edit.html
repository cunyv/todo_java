<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑任务</title>
    <link rel="stylesheet" th:href="@{/css/kanban.css}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✏️</text></svg>">
    <style>
        .edit-container { max-width: 600px; margin: 0 auto; }
        .edit-form { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); padding: 32px; border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); }
        .edit-form h2 { font-size: 1.5rem; font-weight: 600; color: var(--gray-800); margin-bottom: 24px; display: flex; align-items: center; gap: 10px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: var(--gray-700); font-size: 14px; }
        .form-group input[type="text"], .form-group textarea, .form-group select { width: 100%; padding: 12px 16px; border: 2px solid var(--gray-200); border-radius: var(--radius-sm); font-size: 15px; font-family: inherit; transition: all 0.2s ease; background: white; }
        .form-group input[type="text"]:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 3px var(--primary-light); }
        .status-select { appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 12px center; background-size: 16px; padding-right: 40px; }
        .form-actions { display: flex; gap: 12px; margin-top: 28px; }
        .btn-primary { padding: 12px 24px; background: linear-gradient(135deg, var(--primary-color) 0%, #8b5cf6 100%); color: white; border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; gap: 8px; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(99,102,241,0.4); }
        .btn-secondary { padding: 12px 24px; background: var(--gray-100); color: var(--gray-700); border: 2px solid var(--gray-200); border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .btn-secondary:hover { background: var(--gray-200); }
        .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--primary-color); text-decoration: none; font-weight: 500; margin-bottom: 20px; transition: color 0.2s ease; }
        .back-link:hover { color: var(--primary-hover); }
    </style>
</head>
<body>
    <div class="app">
        <div class="user-bar">
            <span>👤 <span th:text="${currentUser.username}">用户</span></span>
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" class="btn-logout-small">退出</button>
            </form>
        </div>
        <div class="edit-container">
            <a th:href="@{/}" class="back-link"><span>←</span> 返回看板</a>
            <div class="edit-form">
                <h2>✏️ 编辑任务</h2>
                <form th:action="@{/todos/{id}(id=${todo.id})}" th:object="${todoUpdateDTO}" method="post">
                    <div class="form-group">
                        <label for="title">任务标题 *</label>
                        <input type="text" id="title" th:field="*{title}" required placeholder="输入任务标题">
                    </div>
                    <div class="form-group">
                        <label for="description">任务描述</label>
                        <textarea id="description" th:field="*{description}" rows="4" placeholder="添加更多细节..."></textarea>
                    </div>
                    <div class="form-group">
                        <label for="status">任务状态</label>
                        <select id="status" th:field="*{status}" class="status-select">
                            <option th:each="s : ${T(com.example.todo.enums.TaskStatus).values()}"
                                    th:value="${s.name()}"
                                    th:text="${s.displayName}">
                            </option>
                        </select>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn-primary"><span>💾</span> 保存修改</button>
                        <a th:href="@{/}" class="btn-secondary"><span>↩️</span> 取消</a>
                    </div>
                </form>
            </div>
        </div>
        <footer class="footer"><p>✨ 任务看板 - 拖拽任务卡片更新状态</p></footer>
    </div>
</body>
</html>
